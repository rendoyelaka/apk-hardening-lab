name: Stage 1+2+3+4+5 - Dex Pipeline + Native Build Check

# Manual trigger only — you run this from the Actions tab, or later from the Telegram bot
on:
  workflow_dispatch:
    inputs:
      apk_path:
        description: 'Path to the APK inside this repo (e.g. companion.apk)'
        required: true
        default: 'companion.apk'

jobs:
  decompile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache apktool
        id: cache-apktool
        uses: actions/cache@v4
        with:
          path: /usr/bin/apktool
          key: apktool-bin-v1

      - name: Install apktool (cache miss only)
        if: steps.cache-apktool.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y apktool

      - name: Confirm apktool installed
        run: apktool --version

      - name: Run Stage 1 (decompile only)
        run: python3 tools/extract_and_encrypt.py "${{ inputs.apk_path }}"

      - name: Run Stage 2 (locate keep vs extract classes)
        run: python3 tools/smali_locator.py build/decoded

      - name: Show class split summary
        run: |
          echo "KEEP (loader dex) — sample of first 20:"
          head -n 20 build/keep_classes.txt
          echo ""
          echo "EXTRACT (logic dex, to encrypt) — sample of first 20:"
          head -n 20 build/extract_classes.txt
          echo ""
          echo "KEEP count: $(wc -l < build/keep_classes.txt)"
          echo "EXTRACT count: $(wc -l < build/extract_classes.txt)"

      - name: Upload decompiled output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: decoded-output
          path: build/decoded
          retention-days: 3

      - name: Upload class split lists as artifact
        uses: actions/upload-artifact@v4
        with:
          name: class-split-lists
          path: |
            build/keep_classes.txt
            build/extract_classes.txt
          retention-days: 3

      - name: Run Stage 3 (build standalone dex from EXTRACT classes)
        run: python3 tools/dex_assembler.py build/decoded build/extract_classes.txt

      - name: Show dex build result
        run: |
          ls -la build/extracted_classes.dex
          echo "Dex size: $(du -h build/extracted_classes.dex | cut -f1)"

      - name: Upload extracted dex as artifact
        uses: actions/upload-artifact@v4
        with:
          name: extracted-dex
          path: build/extracted_classes.dex
          retention-days: 3

      - name: Install pycryptodome
        run: sudo pip install pycryptodome --break-system-packages

      - name: Run Stage 4 (encrypt dex into assets/logic.bin)
        run: python3 tools/encrypt_dex.py build/extracted_classes.dex assets

      - name: Show encryption result
        run: |
          ls -la assets/logic.bin
          echo "Encrypted blob size: $(du -h assets/logic.bin | cut -f1)"
          echo "Key file (hex, build-only — not for assets):"
          cat build/dex_encryption_key.txt

      - name: Upload encrypted blob as artifact
        uses: actions/upload-artifact@v4
        with:
          name: encrypted-logic-blob
          path: assets/logic.bin
          retention-days: 3

      - name: Upload encryption key as artifact (build-only, do not commit)
        uses: actions/upload-artifact@v4
        with:
          name: dex-encryption-key
          path: build/dex_encryption_key.txt
          retention-days: 3

  native-build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d

      - name: Download prebuilt OpenSSL for arm64-v8a
        run: |
          curl -L -o openssl-android.tar.gz \
            https://github.com/217heidai/openssl_for_android/releases/download/3.6.1/openssl-3.6.1-android-arm64-v8a.tar.gz
          mkdir -p third_party/openssl-arm64-v8a
          tar -xzf openssl-android.tar.gz -C third_party/openssl-arm64-v8a
          echo "Extracted contents:"
          find third_party/openssl-arm64-v8a -maxdepth 2

      - name: Attempt CMake configure + build for arm64-v8a
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          mkdir -p build/native-check
          cd build/native-check
          cmake ../../tools/native \
            -DCMAKE_TOOLCHAIN_FILE=${ANDROID_NDK_HOME}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DOPENSSL_ROOT_DIR=${GITHUB_WORKSPACE}/third_party/openssl-arm64-v8a
          cmake --build . --verbose

      - name: Show build output if successful
        if: success()
        run: find build/native-check -name "*.so" -exec ls -la {} \;
