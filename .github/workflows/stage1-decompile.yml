name: Stage 1+2+3+4+5+6 - Full Pipeline + Final Assembly

# Manual trigger only — you run this from the Actions tab, or later from the Telegram bot
on:
  workflow_dispatch:
    inputs:
      apk_path:
        description: 'Path to the APK inside this repo (e.g. companion.apk)'
        required: true
        default: 'companion.apk'

jobs:
  decompile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache apktool
        id: cache-apktool
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/apktool*
          key: apktool-jar-2.9.3-v2

      - name: Install apktool (official jar, cache miss only)
        if: steps.cache-apktool.outputs.cache-hit != 'true'
        run: |
          curl -L -o apktool https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool
          curl -L -o apktool.jar https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar
          chmod +x apktool
          sudo mv apktool /usr/local/bin/apktool
          sudo mv apktool.jar /usr/local/bin/apktool.jar
          sudo apt-get update
          sudo apt-get install -y aapt

      - name: Confirm apktool installed
        run: apktool --version

      - name: Run Stage 1 (decompile only)
        run: python3 tools/extract_and_encrypt.py "${{ inputs.apk_path }}"

      - name: Run Stage 2 (locate keep vs extract classes)
        run: python3 tools/smali_locator.py build/decoded

      - name: Show class split summary
        run: |
          echo "KEEP (loader dex) — sample of first 20:"
          head -n 20 build/keep_classes.txt
          echo ""
          echo "EXTRACT (logic dex, to encrypt) — sample of first 20:"
          head -n 20 build/extract_classes.txt
          echo ""
          echo "KEEP count: $(wc -l < build/keep_classes.txt)"
          echo "EXTRACT count: $(wc -l < build/extract_classes.txt)"

      - name: Upload decompiled output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: decoded-output
          path: build/decoded
          retention-days: 3

      - name: Upload class split lists as artifact
        uses: actions/upload-artifact@v4
        with:
          name: class-split-lists
          path: |
            build/keep_classes.txt
            build/extract_classes.txt
          retention-days: 3

      - name: Run Stage 3 (build standalone dex from EXTRACT classes)
        run: python3 tools/dex_assembler.py build/decoded build/extract_classes.txt

      - name: Show dex build result
        run: |
          ls -la build/extracted_classes.dex
          echo "Dex size: $(du -h build/extracted_classes.dex | cut -f1)"

      - name: Upload extracted dex as artifact
        uses: actions/upload-artifact@v4
        with:
          name: extracted-dex
          path: build/extracted_classes.dex
          retention-days: 3

      - name: Install pycryptodome
        run: sudo pip install pycryptodome --break-system-packages

      - name: Run Stage 4 (encrypt dex into assets/logic.bin)
        run: python3 tools/encrypt_dex.py build/extracted_classes.dex assets

      - name: Show encryption result
        run: |
          ls -la assets/logic.bin
          echo "Encrypted blob size: $(du -h assets/logic.bin | cut -f1)"
          echo "Key file (hex, build-only — not for assets):"
          cat build/dex_encryption_key.txt

      - name: Upload encrypted blob as artifact
        uses: actions/upload-artifact@v4
        with:
          name: encrypted-logic-blob
          path: assets/logic.bin
          retention-days: 3

      - name: Upload encryption key as artifact (build-only, do not commit)
        uses: actions/upload-artifact@v4
        with:
          name: dex-encryption-key
          path: build/dex_encryption_key.txt
          retention-days: 3

  native-build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d

      - name: Download prebuilt OpenSSL for arm64-v8a
        run: |
          echo "Querying GitHub API for actual release asset names..."
          curl -s https://api.github.com/repos/217heidai/openssl_for_android/releases/tags/3.6.1 \
            -o release_info.json
          echo "Available assets:"
          grep -o '"name": *"[^"]*"' release_info.json || cat release_info.json

          DOWNLOAD_URL=$(grep -o '"browser_download_url": *"[^"]*arm64-v8a[^"]*"' release_info.json | head -1 | sed 's/.*"\(https[^"]*\)"/\1/')
          echo "Resolved download URL: $DOWNLOAD_URL"

          if [ -z "$DOWNLOAD_URL" ]; then
            echo "[X] Could not find an arm64-v8a asset in the release JSON. See assets list above."
            exit 1
          fi

          curl -L -o openssl-android.tar.gz "$DOWNLOAD_URL"
          mkdir -p third_party/openssl-arm64-v8a
          tar -xzf openssl-android.tar.gz -C third_party/openssl-arm64-v8a
          echo "Extracted contents:"
          find third_party/openssl-arm64-v8a -maxdepth 3

      - name: Attempt CMake configure + build for arm64-v8a
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          OPENSSL_DIR=$(find third_party/openssl-arm64-v8a -maxdepth 2 -type d -name "lib" -exec dirname {} \;)
          echo "Resolved OpenSSL root: $OPENSSL_DIR"
          ls -la "$OPENSSL_DIR"

          mkdir -p build/native-check
          cd build/native-check
          cmake ../../tools/native \
            -DCMAKE_TOOLCHAIN_FILE=${ANDROID_NDK_HOME}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DOPENSSL_ANDROID_ROOT="${GITHUB_WORKSPACE}/${OPENSSL_DIR}"
          cmake --build . --verbose

      - name: Show build output if successful
        if: success()
        run: find build/native-check -name "*.so" -exec ls -la {} \;

      - name: Upload native .so (arm64-v8a) as artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: native-lib-arm64-v8a
          path: build/native-check/**/*.so
          retention-days: 3

  loader-module-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build loader-module and produce AAR
        run: gradle :loader-module:assembleDebug --no-daemon

      - name: Locate AAR
        id: locate-aar
        run: |
          AAR_PATH=$(find loader-module/build -name "*.aar" | head -1)
          echo "Found AAR at: $AAR_PATH"
          echo "aar_path=$AAR_PATH" >> "$GITHUB_OUTPUT"

      - name: Extract classes.jar from AAR
        run: |
          mkdir -p build/loader-module-extracted
          unzip -o "${{ steps.locate-aar.outputs.aar_path }}" -d build/loader-module-extracted
          echo "AAR contents:"
          find build/loader-module-extracted -type f

      - name: Convert classes.jar to classes.dex using d8
        run: |
          D8_PATH=$(find "$ANDROID_HOME" -name "d8" -type f | head -1)
          echo "Using d8 at: $D8_PATH"
          "$D8_PATH" --output build/loader-module-extracted \
            build/loader-module-extracted/classes.jar
          echo "Result:"
          ls -la build/loader-module-extracted/classes.dex

      - name: Install apktool (for baksmali)
        run: |
          sudo apt-get update
          sudo apt-get install -y apktool

      - name: Disassemble loader dex back to smali via baksmali
        run: |
          baksmali disassemble build/loader-module-extracted/classes.dex \
            -o build/loader-module-smali
          echo "Resulting smali files:"
          find build/loader-module-smali -name "*.smali"

      - name: Upload loader smali as artifact
        uses: actions/upload-artifact@v4
        with:
          name: loader-module-smali
          path: build/loader-module-smali
          retention-days: 3

      - name: Upload loader-module dex as artifact
        uses: actions/upload-artifact@v4
        with:
          name: loader-module-dex
          path: build/loader-module-extracted/classes.dex
          retention-days: 3

      - name: Upload loader-module build output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: loader-module-build-output
          path: loader-module/build/outputs
          retention-days: 3

  final-assembly:
    needs: [decompile, loader-module-build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install apktool (official jar, not apt package)
        run: |
          curl -L -o apktool https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool
          curl -L -o apktool.jar https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar
          chmod +x apktool
          sudo mv apktool /usr/local/bin/apktool
          sudo mv apktool.jar /usr/local/bin/apktool.jar
          sudo apt-get update
          sudo apt-get install -y aapt
          apktool --version

      - name: Verify aapt actually runs
        run: |
          which aapt
          aapt version || echo "[X] aapt exists but failed to execute"

      - name: Download decoded-output artifact
        uses: actions/download-artifact@v4
        with:
          name: decoded-output
          path: build/decoded

      - name: Download class-split-lists artifact
        uses: actions/download-artifact@v4
        with:
          name: class-split-lists
          path: build

      - name: Download encrypted-logic-blob artifact
        uses: actions/download-artifact@v4
        with:
          name: encrypted-logic-blob
          path: assets

      - name: Download loader-module-smali artifact
        uses: actions/download-artifact@v4
        with:
          name: loader-module-smali
          path: build/loader-module-smali

      - name: Show downloaded structure
        run: |
          echo "decoded:"; find build/decoded -maxdepth 1
          echo "lists:"; ls -la build/*.txt
          echo "assets:"; ls -la assets
          echo "loader smali:"; find build/loader-module-smali -name "*.smali"
          echo "--- DIAGNOSING res/type1 issue ---"
          echo "Does type1 exist in original decoded res?"
          find build/decoded/res -maxdepth 1 -name "type1" -o -maxdepth 1 -name "values*" | head -20
          echo "Contents of res/values/public.xml (first 30 lines), if present:"
          find build/decoded/res -name "public.xml" -exec head -30 {} \;

      - name: Run Stage 6 (final assembly)
        run: python3 tools/final_assembly.py build/decoded build/keep_classes.txt build/extract_classes.txt build/loader-module-smali assets/logic.bin

      - name: DIAGNOSE - inspect res/type1 before failure repeats
        if: always()
        run: |
          echo "Does type1 exist in build/decoded/res (untouched original)?"
          ls -la build/decoded/res/ | grep -i type1 || echo "NOT in original decoded res"
          echo ""
          echo "Does type1 exist in build/final_project/res (after our script ran)?"
          ls -la build/final_project/res/ | grep -i type1 || echo "NOT in final_project res either"
          echo ""
          echo "Full top-level res/ listing in final_project:"
          ls build/final_project/res/ | head -40

      - name: Show final APK info
        run: |
          ls -la build/final_unsigned.apk
          echo "Size: $(du -h build/final_unsigned.apk | cut -f1)"

      - name: Upload final unsigned APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-unsigned-apk
          path: build/final_unsigned.apk
          retention-days: 3

  merge-native-and-sign:
    needs: [native-build-check, final-assembly]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK (for apksigner/zipalign)
        uses: android-actions/setup-android@v3

      - name: Download final unsigned APK artifact
        uses: actions/download-artifact@v4
        with:
          name: final-unsigned-apk
          path: build

      - name: Download native .so (arm64-v8a) artifact
        uses: actions/download-artifact@v4
        with:
          name: native-lib-arm64-v8a
          path: build/native-libs

      - name: Show downloaded structure
        run: |
          echo "Unsigned APK:"; ls -la build/final_unsigned.apk
          echo "Native libs downloaded:"; find build/native-libs -name "*.so"

      - name: Insert native .so into APK under lib/arm64-v8a/
        run: |
          set -e
          cp build/final_unsigned.apk build/apk-with-native.apk
          SO_FILE=$(find build/native-libs -name "*.so" | head -1)
          if [ -z "$SO_FILE" ]; then
            echo "[X] No .so file found in downloaded native-lib-arm64-v8a artifact."
            exit 1
          fi
          SO_NAME=$(basename "$SO_FILE")
          echo "Using native library: $SO_FILE -> lib/arm64-v8a/$SO_NAME"

          mkdir -p build/lib_staging/lib/arm64-v8a
          cp "$SO_FILE" "build/lib_staging/lib/arm64-v8a/$SO_NAME"

          cd build/lib_staging
          zip -r ../apk-with-native.apk "lib/arm64-v8a/$SO_NAME"
          cd ../..

          echo "APK contents (lib/ entries):"
          unzip -l build/apk-with-native.apk | grep "lib/" || echo "[!] No lib/ entries found — check the steps above"

      - name: Zipalign the APK
        run: |
          BUILD_TOOLS_DIR=$(find "$ANDROID_HOME/build-tools" -maxdepth 1 -type d | sort -V | tail -1)
          echo "Using build-tools: $BUILD_TOOLS_DIR"
          "$BUILD_TOOLS_DIR/zipalign" -p -f 4 build/apk-with-native.apk build/apk-aligned.apk

      - name: Generate a debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore build/debug.keystore \
            -alias debugkey \
            -storepass android -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, S=Debug, C=US"

      - name: Sign the APK with apksigner
        run: |
          BUILD_TOOLS_DIR=$(find "$ANDROID_HOME/build-tools" -maxdepth 1 -type d | sort -V | tail -1)
          "$BUILD_TOOLS_DIR/apksigner" sign \
            --ks build/debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out build/final_signed_debug.apk \
            build/apk-aligned.apk

      - name: Verify the signed APK
        run: |
          BUILD_TOOLS_DIR=$(find "$ANDROID_HOME/build-tools" -maxdepth 1 -type d | sort -V | tail -1)
          "$BUILD_TOOLS_DIR/apksigner" verify --print-certs build/final_signed_debug.apk
          echo "Final signed APK:"
          ls -la build/final_signed_debug.apk
          echo "Size: $(du -h build/final_signed_debug.apk | cut -f1)"

      - name: Upload final signed (debug) APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-signed-debug-apk
          path: build/final_signed_debug.apk
          retention-days: 7
